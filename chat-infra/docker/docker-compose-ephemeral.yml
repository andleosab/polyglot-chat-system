# version: '3.8' # onsolete since docker compose 2.20+

services:
  postgres:
    image: postgres:17-alpine3.22
    container_name: chat-postgres-ephemeral
    environment:
      # POSTGRES_DB: ${DB_NAME} # not needed since we have init scripts that create the database and tables
      # POSTGRES_USER: ${DB_USER} # not needed since we have init scripts that create the user with the same name as the database
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d      
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ]
      timeout: 45s
      interval: 10s
      retries: 50      
    networks:
      - chat-demo-net 

  # ------ Kafka (single broker example with Redpanda or Bitnami Kafka) ------
  kafka:
    image: redpandadata/redpanda:v24.1.2
    container_name: chat-kafka-ephemeral
    command: >
      redpanda start
      --overprovisioned
      --smp 1
      --reserve-memory 0M
      --node-id 1
      --check=false
      --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      --advertise-kafka-addr PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    networks:
      - chat-demo-net 
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # depends_on:
    #   - chat-ui
    #   - chat-delivery-service
    networks:
      - chat-demo-net      

networks:
  chat-demo-net:
    name: chat-demo-net   # same fixed network name     
    driver: bridge #  default network type - creates a private internal network on a single host   
    # driver: host # The container shares the host machine’s network stack directly          