# version: "3.9" deprecated

services:
  chat-message-service:
    image: ${DOCKER_IMAGE}
    container_name: chat-message-service
    # Run as non-root (works even in scratch)
    user: "10001:10001"
    ports:
      - "8080:8080"   # REST / HTTP
      - "9090:9090"   # gRPC
      - "9100:9100"   # Prometheus metrics (optional)
    environment:
      # Example environment variables — update to match your app
      APP_ENV: "production"
      PORT: "8080"
      GRPC_PORT: "9090"
      METRICS_PORT: "9100"
      DATABASE_URL: ${DB_URL}
      KAFKA_BROKERS: "kafka:9092"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    # depends_on:
      # - postgres
      # - kafka
    networks:
      - chat-demo-net      

