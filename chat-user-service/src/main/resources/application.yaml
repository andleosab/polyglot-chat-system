---

# -- Environments
# -- UA - UAT
# -- ST - Staging
# -- PR - Production
# -- ND - or just all non dev

spring:
  config:
    activate:
      on-profile: ST,PR,ND

    jpa:
        generate-ddl: false
        open-in-view: false
        show-sql: false
        hibernate:
            ddl-auto: none
