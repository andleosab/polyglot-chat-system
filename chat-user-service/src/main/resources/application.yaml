  jackson:
    deserialization:
      fail-on-unknown-properties: true
      
# Producer properties
  kafka.producer.bootstrap-servers: ${kafka.bootstrap.servers:http://localhost:9092}
  kafka.producer.key-serializer: org.apache.kafka.common.serialization.StringSerializer
#  kafka.producer.value-serializer: io.cloudevents.kafka.CloudEventSerializer
  kafka.producer.value-serializer: org.apache.kafka.common.serialization.StringSerializer
  kafka.producer.group-id: chat

  kafka.producer.acks: all
  kafka.producer.retries: 1

# Common Kafka Properties
#auto.create.topics.enable=true
          
# custom  kafka properties
#kafka.producer.topic.default: ${KAFKA_PRODUCER_TOPIC:vendorFileMessage}   

app.jwt.secret: ${JWT_SECRET}             

