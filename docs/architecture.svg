<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Chat Demo System Architecture</title>
<desc>Architecture diagram: Browser connects through Nginx to chat-web BFF (SvelteKit) and chat-delivery-service (Quarkus WebSocket). BFF calls chat-user-service (Spring Boot) and chat-message-service (Go). Delivery service calls message service for conversation IDs on connect, and exchanges messages with Kafka. Message service produces participant events to Kafka and persists messages consumed from Kafka. Three PostgreSQL databases: chat-user, chat-message, and chat-auth (Better Auth).</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #333; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; fill: #666; }
    .c-gray rect   { fill: #f1efe8; stroke: #888780; }
    .c-gray text   { fill: #2c2c2a; }
    .c-purple rect { fill: #eeedfe; stroke: #534ab7; }
    .c-purple text { fill: #26215c; }
    .c-teal rect   { fill: #e1f5ee; stroke: #0f6e56; }
    .c-teal text   { fill: #04342c; }
    .c-blue rect   { fill: #e6f1fb; stroke: #185fa5; }
    .c-blue text   { fill: #042c53; }
    .c-amber rect  { fill: #faeeda; stroke: #854f0b; }
    .c-amber text  { fill: #412402; }
    line, path { stroke: #888780; }
  </style>
</defs>

<!-- Browser -->
<g class="c-gray">
  <rect x="260" y="20" width="160" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Browser</text>
</g>
<line x1="340" y1="60" x2="340" y2="88" stroke-width="1" marker-end="url(#a)"/>

<!-- Nginx -->
<g class="c-gray">
  <rect x="210" y="90" width="260" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Nginx</text>
  <text class="ts" x="340" y="126" text-anchor="middle" dominant-baseline="central">reverse proxy · :80</text>
</g>

<!-- Nginx → chat-web -->
<path d="M 268 140 L 268 162 L 135 162 L 135 182" fill="none" stroke-width="1" marker-end="url(#a)"/>
<text class="ts" x="196" y="158" text-anchor="middle">HTTP /</text>

<!-- Nginx → chat-delivery -->
<path d="M 412 140 L 412 162 L 530 162 L 530 182" fill="none" stroke-width="1" marker-end="url(#a)"/>
<text class="ts" x="484" y="158" text-anchor="middle">WS /chat/</text>

<!-- chat-web BFF -->
<g class="c-purple">
  <rect x="20" y="182" width="228" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="134" y="201" text-anchor="middle" dominant-baseline="central">chat-web</text>
  <text class="ts" x="134" y="220" text-anchor="middle" dominant-baseline="central">SvelteKit 5 · Better Auth</text>
</g>

<!-- chat-delivery-service -->
<g class="c-teal">
  <rect x="422" y="182" width="218" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="531" y="201" text-anchor="middle" dominant-baseline="central">chat-delivery</text>
  <text class="ts" x="531" y="220" text-anchor="middle" dominant-baseline="central">Quarkus · WebSocket</text>
</g>

<!-- chat-web → chat-user -->
<line x1="95" y1="236" x2="95" y2="292" stroke-width="1" marker-end="url(#a)"/>

<!-- chat-web → chat-message (dashed) -->
<path d="M 248 209 L 308 209 L 308 318 L 376 318" fill="none" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text class="ts" x="338" y="254" text-anchor="middle">REST + JWT</text>

<!-- chat-delivery → chat-message (conv IDs) -->
<line x1="506" y1="236" x2="495" y2="292" stroke-width="1" marker-end="url(#a)"/>
<text class="ts" x="458" y="266" text-anchor="middle">conv IDs</text>

<!-- chat-user-service -->
<g class="c-blue">
  <rect x="20" y="292" width="196" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="118" y="311" text-anchor="middle" dominant-baseline="central">chat-user</text>
  <text class="ts" x="118" y="330" text-anchor="middle" dominant-baseline="central">Spring Boot · JPA</text>
</g>

<!-- chat-message-service -->
<g class="c-blue">
  <rect x="376" y="292" width="234" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="493" y="311" text-anchor="middle" dominant-baseline="central">chat-message</text>
  <text class="ts" x="493" y="330" text-anchor="middle" dominant-baseline="central">Go · Chi · SQLC</text>
</g>

<!-- chat-message ↔ Kafka -->
<line x1="487" y1="346" x2="487" y2="400" stroke-width="1" marker-start="url(#a)" marker-end="url(#a)"/>

<!-- chat-delivery → Kafka (outside right of message box) -->
<path d="M 610 236 L 636 236 L 636 418 L 610 418" fill="none" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

<!-- Kafka -->
<g class="c-amber">
  <rect x="376" y="402" width="234" height="50" rx="8" stroke-width="0.5"/>
  <text class="th" x="493" y="421" text-anchor="middle" dominant-baseline="central">Kafka</text>
  <text class="ts" x="493" y="440" text-anchor="middle" dominant-baseline="central">Redpanda · 3 topics</text>
</g>

<!-- chat-user → user DB -->
<line x1="95" y1="346" x2="95" y2="472" stroke-width="1" marker-end="url(#a)"/>

<!-- chat-message → msg DB -->
<line x1="476" y1="452" x2="476" y2="472" stroke-width="1" marker-end="url(#a)"/>

<!-- chat-user DB -->
<g class="c-gray">
  <rect x="20" y="472" width="160" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="100" y="490" text-anchor="middle" dominant-baseline="central">chat-user DB</text>
  <text class="ts" x="100" y="507" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
</g>

<!-- chat-auth DB -->
<g class="c-gray">
  <rect x="200" y="472" width="158" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="279" y="490" text-anchor="middle" dominant-baseline="central">chat-auth DB</text>
  <text class="ts" x="279" y="507" text-anchor="middle" dominant-baseline="central">Better Auth · PostgreSQL</text>
</g>
<path d="M 134 236 L 134 456 L 279 456 L 279 472" fill="none" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

<!-- chat-message DB -->
<g class="c-gray">
  <rect x="376" y="472" width="200" height="46" rx="6" stroke-width="0.5"/>
  <text class="th" x="476" y="490" text-anchor="middle" dominant-baseline="central">chat-message DB</text>
  <text class="ts" x="476" y="507" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
</g>

<!-- Legend -->
<line x1="40" y1="536" x2="64" y2="536" stroke-width="1" marker-end="url(#a)"/>
<text class="ts" x="70" y="540">service call</text>
<line x1="160" y1="536" x2="184" y2="536" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>
<text class="ts" x="190" y="540">BFF-injected / async</text>
<line x1="336" y1="536" x2="360" y2="536" stroke-width="1" marker-start="url(#a)" marker-end="url(#a)"/>
<text class="ts" x="366" y="540">bidirectional (produce + consume)</text>
</svg>
